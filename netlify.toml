# Netlify build config for the Crescent Car Reports admin app (Next.js).
#
# Netlify's Next runtime (@netlify/plugin-nextjs, pinned below) handles App
# Router SSR, API routes and server actions — no extra config needed. Deploy
# directly with the CLI from this folder:  netlify deploy --build --prod
#
# Set production environment variables in the Netlify UI
# (Site settings -> Environment variables), NOT here. At minimum:
#   NEXT_PUBLIC_SUPABASE_URL            -> Crescent Car Reports project (jwslaqufrdoodsxasxnr)
#   NEXT_PUBLIC_SUPABASE_ANON_KEY       -> same project's anon (publishable) key
#   SUPABASE_SERVICE_ROLE_KEY           -> same project's service-role key
# Plus any auth / Google Calendar / Sentry keys the app uses.
# Don't commit real secrets to this file.

[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# PDF rendering (/reports/:id/pdf) spawns headless Chromium. On a cold start
# @sparticuz/chromium-min downloads a ~50MB pack from CHROMIUM_PACK_URL (pinned
# to the exact installed chromium-min version). To keep that within the function
# time budget:
#   • Set CHROMIUM_PACK_URL (env) to a self-hosted copy of the pack on Supabase
#     Storage in the same region — much faster than the GitHub release default.
#   • If the PDF route times out on cold starts, raise the function timeout in the
#     Netlify UI (Site config → Functions) — it is an account/UI setting, not a
#     netlify.toml key. The render token now lasts 5 min and is minted after the
#     cold-start download, so token expiry is no longer the limiting factor.
